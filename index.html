        // --- INISIALISASI DASAR THREE.JS ---
        const container = document.getElementById('viewer-container');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f4f8); // Latar dibuat lebih terang agar warna bangunan terlihat

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // --- PENYESUAIAN KONTROL KAMERA ---
        // 1. Kunci sudut vertikal agar kamera tidak bisa masuk ke bawah tanah (maksimal sejajar permukaan)
        controls.maxPolarAngle = Math.PI / 2; 
        
        // 2. Sesuaikan kecepatan rotasi (default 1.0, kita turunkan sedikit agar lebih halus)
        controls.rotateSpeed = 0.7; 
        
        // 3. Batasi jarak zoom agar tidak terlalu jauh atau tembus terlalu dalam ke objek
        controls.minDistance = 1;
        controls.maxDistance = 100;

        // Pencahayaan yang diperbaiki untuk warna
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); // Cahaya merata
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.6); // Cahaya matahari
        dirLight1.position.set(10, 15, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3); // Cahaya pengisi dari belakang

                reader.onload = e => resolve(e.target.result);
                reader.onerror = e => reject(e);
                reader.readAsText(file);

        // Fungsi utama memproses string mentah menjadi Objek 3D (Refactor agar bisa dipakai ulang)
        function parseAndLoadModel(objText, mtlText) {
            try {
                const objLoader = new THREE.OBJLoader();

                // Proses material jika teks MTL tersedia
                if (mtlText) {
                    const mtlLoader = new THREE.MTLLoader();
                    const materials = mtlLoader.parse(mtlText);
                    materials.preload();
                    objLoader.setMaterials(materials);
                }

                // Parse teks objek
                const obj = objLoader.parse(objText);

                if (currentObject) {
                    scene.remove(currentObject);
                }

                // Terapkan penyesuaian untuk material
                obj.traverse((child) => {
                    if (child.isMesh) {
                        if (child.geometry) {
                            child.geometry.computeVertexNormals();
                        }
                        if (child.material) {
                            if (Array.isArray(child.material)) {
                                child.material.forEach(m => m.side = THREE.DoubleSide);
                            } else {
                                child.material.side = THREE.DoubleSide;
                            }
                        }
                    }
                });

                // PERBAIKAN ORIENTASI (Z-up ke Y-up)
                obj.rotation.x = -Math.PI / 2;

                // AUTO-SCALING DAN CENTERING
                const initialBox = new THREE.Box3().setFromObject(obj);
                const size = initialBox.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                
                const targetSize = 10; 
                if (maxDim > 0) {
                    const scaleFactor = targetSize / maxDim;
                    obj.scale.set(scaleFactor, scaleFactor, scaleFactor);
                }

                obj.updateMatrixWorld(true);
                const scaledBox = new THREE.Box3().setFromObject(obj);
                const center = scaledBox.getCenter(new THREE.Vector3());
                obj.position.sub(center);

                // Set posisi kamera
                camera.position.set(0, targetSize * 0.5, targetSize * 1.5);
                controls.target.set(0, 0, 0);
                controls.update();

                currentObject = obj;
                scene.add(currentObject);

            } catch (error) {
                console.error("Gagal memuat 3D model:", error);
                alert("Terjadi kesalahan saat merender objek.\nDetail: " + error.message); 
            }
        }

        // --- RENDER MODEL DEFAULT SAAT HALAMAN DIMUAT ---
        parseAndLoadModel(defaultOBJ, defaultMTL);

        // --- LOOP ANIMASI ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        // --- PENANGANAN RESIZE JENDELA ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = animate;
    </script>
</body>
</html>
